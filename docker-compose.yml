version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: documenthub-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: documenthub
      POSTGRES_PASSWORD: documenthub_dev_2026
      POSTGRES_DB: documenthub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U documenthub']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
